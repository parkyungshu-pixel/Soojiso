name: Build Android APK

on:
  push:
    branches: ["**"]
    paths:
      - "autofill-android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "autofill-android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: autofill-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          echo "Found APK at: $APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoFillList-debug-apk
          path: autofill-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
